# Dependabot — abre PRs semanais com atualizações de dependências.
#
# Cobertura:
# - Python (pip): edita backend/pyproject.toml + backend/requirements.txt.
#   NÃO toca backend/uv.lock — necessário sync manual após mergear.
#
#   Workflow correto após mergear PR Python (descobrimos na sessão 2026-05-23):
#     # 1. Identificar os pacotes atualizados pelo PR (titulo/diff).
#     # 2. Para CADA pacote, forçar upgrade no lock:
#     cd backend
#     uv lock --upgrade-package <NOME1> --upgrade-package <NOME2> ...
#     # 3. Regenerar requirements.txt do lock atualizado:
#     uv export --format requirements.txt --output-file requirements.txt \
#       --no-hashes --no-emit-project --no-dev
#     # 4. Commit do uv.lock + requirements.txt como `chore(deps): sync...`
#
#   POR QUE `--upgrade-package` e NÃO `uv lock` puro:
#     `uv lock` sem flags mantém versões existentes do lock se as constraints
#     do pyproject.toml ainda são satisfeitas. Para transitive deps (que o
#     Dependabot edita em requirements.txt mas não em pyproject.toml), `uv lock`
#     puro IGNORA a versão nova → o `uv export` final sobrescreve o update do
#     Dependabot com a versão antiga do lock. Bug observado com cron-descriptor,
#     click, pyjwt — todos transitive. Use --upgrade-package para destravar.
#
#   Se o PR do Dependabot for INCOMPATÍVEL (constraint de parent não aceita),
#   `uv lock --upgrade-package` falha silenciosamente (mantém versão antiga).
#   Caso real: cron-descriptor 2.0.8 — django-celery-beat 2.9.0 exige <2.0.
#   Solução: adicionar `ignore` no bloco pip abaixo.
#
# - Node: edita package.json + package-lock.json (atualização nativa, sem drift).
# - GitHub Actions: edita versões em .github/workflows/*.yml.
#
# IMPORTANTE: este arquivo é lido do BRANCH DEFAULT (main). Mudanças aqui só
# valem após PR develop → main mergeado.
#
# Item S16 do Improvement-system.md §11.6.

version: 2

updates:
  # ── Python (backend) ──────────────────────────────────────────────────────
  - package-ecosystem: 'pip'
    directory: '/backend'
    # PR sobe em develop (fluxo do CONTRIBUTING.md: nada vai direto pra main).
    target-branch: 'develop'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'America/Sao_Paulo'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'backend'
    commit-message:
      prefix: 'deps(py)'
      include: 'scope'
    groups:
      # Agrupa todas as updates patch+minor num único PR semanal
      # (reduz ruído; security updates ainda abrem PR separado urgente)
      python-non-major:
        update-types:
          - 'minor'
          - 'patch'
    ignore:
      # django-filter 25+ exige django>=5.2. Projeto está em django==5.1.4.
      # Subir django é decisão sprint-level (testar middlewares, settings
      # deprecadas, etc.) — quando subir, remover este ignore.
      # Tracker: B16 do Improvement-system.md.
      - dependency-name: 'django-filter'
        update-types: ['version-update:semver-major']

      # cron-descriptor 2.x — django-celery-beat 2.9.0 declara
      # `cron-descriptor<2.0.0,>=1.2.32`. Dependabot propõe upgrade sem checar
      # constraint do parent, gera ruído. Remover quando django-celery-beat
      # subir suporte (provável 3.x). Investigado em sessão 2026-05-23.
      - dependency-name: 'cron-descriptor'
        update-types: ['version-update:semver-major']

      # django major (5.x → 6.x) também depende de B16 (subir 5.2 primeiro).
      # Sem este ignore, Dependabot propõe django 6.0+ direto, que quebra
      # libs intermediárias e o jump é inseguro.
      - dependency-name: 'django'
        update-types: ['version-update:semver-major']

  # ── Node (frontend) ───────────────────────────────────────────────────────
  - package-ecosystem: 'npm'
    directory: '/'
    target-branch: 'develop'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'America/Sao_Paulo'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
      - 'frontend'
    commit-message:
      prefix: 'deps(npm)'
      include: 'scope'
    groups:
      js-non-major:
        update-types:
          - 'minor'
          - 'patch'

  # ── GitHub Actions (workflows) ────────────────────────────────────────────
  - package-ecosystem: 'github-actions'
    directory: '/'
    target-branch: 'develop'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'America/Sao_Paulo'
    open-pull-requests-limit: 3
    labels:
      - 'dependencies'
      - 'ci'
    commit-message:
      prefix: 'deps(actions)'
