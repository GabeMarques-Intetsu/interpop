<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon SVG do Interpop (caixa navy + "i" itálica). Path renomeado
         de /favicon.svg para /interpop-icon.svg para forçar revalidação de
         cache em browsers que ainda mostravam o ícone genérico do Vite. -->
    <link rel="icon" type="image/svg+xml" href="/interpop-icon.svg" />
    <link rel="apple-touch-icon" href="/interpop-icon.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Interpop — análise crítica do Soft Power e da hegemonia global a partir da cultura pop, da mídia e das relações internacionais."
    />
    <meta name="theme-color" content="#19144c" />
    <meta property="og:title" content="Interpop — Soft Power & Cultura Pop" />
    <meta
      property="og:description"
      content="Análise crítica do Soft Power e da hegemonia global a partir da cultura pop e das dinâmicas midiáticas."
    />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="pt_BR" />
    <title>Interpop — Soft Power & Cultura Pop</title>
  </head>
  <body>
    <div vw class="enabled">
      <div vw-access-button class="active"></div>
      <div vw-plugin-wrapper>
        <div class="vw-plugin-top-wrapper"></div>
      </div>
    </div>
    <div id="root"></div>
    <!-- App (módulo — não bloqueia parse). -->
    <script type="module" src="/src/main.tsx"></script>
    <!-- VLibras (acessibilidade Libras, Lei 10.436/2002). `defer` evita
         bloquear o parse do HTML; o widget só inicializa após o DOM
         pronto (DOMContentLoaded). Item A6 da reorganization-proposal. -->
    <script defer src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script defer>
      window.addEventListener('DOMContentLoaded', () => {
        if (window.VLibras)
          new window.VLibras.Widget('https://vlibras.gov.br/app');
      });
    </script>
  </body>
</html>
